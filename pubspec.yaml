name: quan_ly_nha_tro
description: "Ứng dụng quản lý nhà trọ"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.8.1
  provider: ^6.1.2
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  intl: ^0.20.2
  image_picker: ^1.1.2
  uuid: ^4.5.1
  drift: ^2.32.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1
  drift_flutter: ^0.3.0
  flutter_riverpod: ^2.5.1
  supabase_flutter: ^2.12.2
  screenshot: ^3.0.0
  pdf: ^3.12.0
  printing: ^5.14.3
  shared_preferences: ^2.5.5
  share_plus: ^13.0.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.32.1
  build_runner: ^2.13.1
  mocktail: ^1.0.5
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icon_minimalist.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#f6f7f8"
  image: "assets/icons/icon_minimalist.png"
  android_12:
    image: "assets/icons/icon_minimalist.png"
    color: "#f6f7f8"
  web: true
